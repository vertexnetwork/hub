name: Sync from vertex-network-hub

# Listens for repository_dispatch from the hub and pulls updated config files.
# Also runs daily on cron as a belt-and-suspenders safety net in case a dispatch is missed.
#
# REQUIRED: this spoke must be listed in vertex-network-hub/config/spokes.json
# and the hub must have HUB_DISPATCH_TOKEN configured.

on:
  repository_dispatch:
    types: [vertex-hub-sync]
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  HUB_RAW: https://raw.githubusercontent.com/ThatMovieGuyOriginal/vertex-network-hub/main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull synced files from hub
        run: |
          set -eu
          mkdir -p public/.well-known
          curl -fsSL "$HUB_RAW/config/network.json"   -o public/network.json
          curl -fsSL "$HUB_RAW/config/ai-bots.json"   -o public/ai-bots.json
          curl -fsSL "$HUB_RAW/crawler/ads.txt"       -o public/ads.txt
          curl -fsSL "$HUB_RAW/crawler/app-ads.txt"   -o public/app-ads.txt
          curl -fsSL "$HUB_RAW/crawler/humans.txt"    -o public/humans.txt

      - name: Open sync PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync from vertex-network-hub"
          title: "chore: sync from vertex-network-hub"
          body: |
            Automated sync from [vertex-network-hub](https://github.com/ThatMovieGuyOriginal/vertex-network-hub).

            - Triggered by: `${{ github.event.client_payload.actor || github.event_name }}`
            - Hub commit: `${{ github.event.client_payload.sha || 'n/a' }}`

            Auto-merge once CI is green.
          branch: hub-sync
          delete-branch: true
          labels: hub-sync,automated
