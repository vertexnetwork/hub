name: Sync from vertex-network-hub

# Listens for repository_dispatch from the hub and pulls updated network-wide files.
# Also runs daily on cron as a belt-and-suspenders safety net in case a dispatch is missed.
#
# WHAT GETS SYNCED BY DEFAULT (safe — these are network-wide, identical on every spoke):
#   public/network.json   — registry of all sites; drives /network page
#   public/ai-bots.json   — AI crawler allowlist for robots.ts
#
# WHAT IS NOT SYNCED (per-spoke; the hub never overwrites these):
#   public/ads.txt, public/app-ads.txt — each site's AdSense/Mediavine publisher IDs differ
#   public/humans.txt                  — each site has its own credits
#   public/.well-known/security.txt    — each site has its own security contact
#   any product code, brand assets, or siteConfig
#
# REQUIRED: this spoke must be listed in vertex-network-hub/config/spokes.json
# and the hub must have HUB_DISPATCH_TOKEN configured.

on:
  repository_dispatch:
    types: [vertex-hub-sync]
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  HUB_RAW: https://raw.githubusercontent.com/ThatMovieGuyOriginal/vertex-network-hub/main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull network-wide files from hub
        run: |
          set -eu
          mkdir -p public
          # Network-wide — always safe to overwrite; identical on every spoke.
          curl -fsSL "$HUB_RAW/config/network.json"   -o public/network.json
          curl -fsSL "$HUB_RAW/config/ai-bots.json"   -o public/ai-bots.json

          # OPT-IN: uncomment a line below ONLY if this spoke wants the hub's
          # version of that file to overwrite its local copy on every sync.
          # Most spokes should leave these commented and own their own values.
          #
          # curl -fsSL "$HUB_RAW/crawler/ads.txt"       -o public/ads.txt
          # curl -fsSL "$HUB_RAW/crawler/app-ads.txt"   -o public/app-ads.txt
          # curl -fsSL "$HUB_RAW/crawler/humans.txt"    -o public/humans.txt

      - name: Open sync PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync from vertex-network-hub"
          title: "chore: sync from vertex-network-hub"
          body: |
            Automated sync from [vertex-network-hub](https://github.com/ThatMovieGuyOriginal/vertex-network-hub).

            - Triggered by: `${{ github.event.client_payload.actor || github.event_name }}`
            - Hub commit: `${{ github.event.client_payload.sha || 'n/a' }}`

            Auto-merge once CI is green.
          branch: hub-sync
          delete-branch: true
          labels: hub-sync,automated
